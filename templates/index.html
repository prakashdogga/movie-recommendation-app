<!DOCTYPE html>
<html>
<head>
    <title>TMDB Movie Recommender</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

    <h1>🎬 TMDB Movie Recommendation System</h1>

    <form method="POST">
        <input 
            type="text" 
            name="movie" 
            placeholder="Enter movie name (e.g., Avatar)"
            value="{{ movie_name }}"
            required
            style="padding:10px; width:300px;"
        >
        <button type="submit" style="padding:10px;">
            Recommend
        </button>
    </form>

    {% if recommendations %}
        <h2>Top 5 Similar Movies:</h2>
        <ul style="list-style:none;">
            {% for rec in recommendations %}
                <li>🎥 {{ rec }}</li>
            {% endfor %}
        </ul>
    {% endif %}

</body>
</html>
